name: Saludo usando variables y secretos
on:
  workflow_dispatch:
env:
  DIA_DE_LA_SEMANA: Lunes 
jobs:
  saludo-variables:
    runs-on: ubuntu-latest
    env:
      SALUDO: Hola
    steps:
      - name: Saludos variables
        run: echo "$SALUDO, ${{ vars.NOMBRE }}. Hoy es ${{ env.DIA_DE_LA_SEMANA }}!"
  saludo-secretos:
    runs-on: ubuntu-latest
    steps:
      - name: saludo secretos
        run: echo "$SALUDO, ${{ vars.NOMBRE }}. Tu contrasena es ${{ secrets.CONTRASENA }}!"
        
